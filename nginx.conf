# ============================================================
# nginx.conf — Task Manager PWA
# Fase 1: HTTP solamente (SSL se activa despues con Certbot)
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Ruta para la verificacion de Let's Encrypt / Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---- Raiz de la aplicacion ----
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — React Router compatible
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estaticos (JS, CSS, fonts, imagenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cabeceras correctas para el Service Worker
    location /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # El manifest de la PWA
    location /manifest.webmanifest {
        expires 1h;
        add_header Cache-Control "public";
        add_header Content-Type "application/manifest+json";
    }

    # Endpoint de healthcheck para Docker
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Compresion gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml text/javascript application/manifest+json;
    gzip_min_length 1000;
}
